name: GitHub Profile Trophy

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at 12:00 AM UTC
  workflow_dispatch: # Allows you to manually trigger the workflow

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: NoHaitch
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add trophy.svg
          git commit -m "chore: update github profile trophies" || echo "No changes to commit"
          git push
